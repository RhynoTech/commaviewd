name: commaviewd-ci

on:
  push:
    branches: [master]
    paths:
      - 'commaviewd/**'
      - '.github/workflows/commaviewd-ci.yml'
  pull_request:
    paths:
      - 'commaviewd/**'
      - '.github/workflows/commaviewd-ci.yml'
  workflow_dispatch:

concurrency:
  group: commaviewd-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENPILOT_REF: a27efe5796e31f77e97efb33762522f2ddc3b0d0

jobs:
  verify:
    name: Build + unit tests + reproducibility
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout CommaView
        uses: actions/checkout@v4

      - name: Install toolchain + deps
        id: armcapnp
        run: |
          set -euxo pipefail
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            capnproto \
            python3 \
            libzmq3-dev \
            libcapnp-dev

          capnp_pkg=""
          for pkg in libcapnp-0.8.0 libcapnp-0.9.2 libcapnp-1.0.1 libcapnp-1.0.2; do
            if apt-cache show "${pkg}:arm64" >/dev/null 2>&1; then
              capnp_pkg="$pkg"
              break
            fi
          done

          if [[ -z "$capnp_pkg" ]]; then
            capnp_pkg="$(apt-cache search '^libcapnp-[0-9]' | awk '{print $1}' | sort -V | tail -n1 || true)"
          fi

          if [[ -z "$capnp_pkg" ]]; then
            echo "::error::No arm64 libcapnp runtime package found"
            exit 1
          fi

          sudo apt-get install -y --no-install-recommends "${capnp_pkg}:arm64"

          ARM_CAPNP_SO="$(ls -1 /usr/lib/aarch64-linux-gnu/libcapnp-*.so | head -n1 || true)"
          ARM_KJ_SO="$(ls -1 /usr/lib/aarch64-linux-gnu/libkj-*.so | head -n1 || true)"

          if [[ -z "$ARM_CAPNP_SO" || -z "$ARM_KJ_SO" ]]; then
            echo "::error::Failed to detect arm64 capnp/kj shared libraries"
            ls -la /usr/lib/aarch64-linux-gnu | head -n 200
            exit 1
          fi

          echo "arm_capnp_so=$ARM_CAPNP_SO" >> "$GITHUB_OUTPUT"
          echo "arm_kj_so=$ARM_KJ_SO" >> "$GITHUB_OUTPUT"

      - name: Checkout openpilot source
        uses: actions/checkout@v4
        with:
          repository: commaai/openpilot
          ref: ${{ env.OPENPILOT_REF }}
          path: openpilot-src
          submodules: recursive

      - name: Run commaviewd verification pipeline
        env:
          OP_ROOT: ${{ github.workspace }}/openpilot-src
          ARM_CAPNP_SO: ${{ steps.armcapnp.outputs.arm_capnp_so }}
          ARM_KJ_SO: ${{ steps.armcapnp.outputs.arm_kj_so }}
        run: |
          set -euxo pipefail
          commaviewd/scripts/run-verification.sh

      - name: Upload dist artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commaviewd-dist-${{ github.sha }}
          path: |
            dist/commaviewd-host
            dist/commaviewd-aarch64
            dist/reproducible-build-manifest.json
          if-no-files-found: warn
