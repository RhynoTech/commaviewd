name: commaviewd-ci

on:
  push:
    branches: [master]
    paths:
      - 'commaviewd/**'
      - '.github/workflows/commaviewd-ci.yml'
  pull_request:
    paths:
      - 'commaviewd/**'
      - '.github/workflows/commaviewd-ci.yml'
  workflow_dispatch:

concurrency:
  group: commaviewd-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.target.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: openpilot-release-mici-staging
            upstream_repo: commaai/openpilot
            upstream_ref: release-mici-staging
          - name: sunnypilot-staging
            upstream_repo: sunnypilot/sunnypilot
            upstream_ref: staging

    steps:
      - name: Checkout CommaView
        uses: actions/checkout@v4

      - name: Restore apt package cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/commaview-apt/archives
          key: apt-${{ runner.os }}-${{ runner.arch }}-commaviewd-toolchain-v1
          restore-keys: |
            apt-${{ runner.os }}-${{ runner.arch }}-commaviewd-toolchain-

      - name: Install toolchain + deps
        id: armcapnp
        run: |
          set -euxo pipefail
          sudo dpkg --add-architecture arm64

          CODENAME="$(. /etc/os-release && echo "${VERSION_CODENAME}")"
          sudo mv /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list.d/ubuntu.sources.bak 2>/dev/null || true
          cat <<EOF | sudo tee /etc/apt/sources.list >/dev/null
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME} main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-backports main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu ${CODENAME}-security main restricted universe multiverse

          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-security main restricted universe multiverse
          EOF
          APT_CACHE_DIR="$HOME/.cache/commaview-apt/archives"
          mkdir -p "$APT_CACHE_DIR/partial"

          sudo apt-get -o Dir::Cache::archives="$APT_CACHE_DIR" update
          sudo apt-get -o Dir::Cache::archives="$APT_CACHE_DIR" install -y --no-install-recommends \
            clang \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            capnproto \
            python3 \
            libzmq3-dev \
            libcapnp-dev

          capnp_pkg=""
          for pkg in libcapnp-0.8.0 libcapnp-0.9.2 libcapnp-1.0.1 libcapnp-1.0.2; do
            if apt-cache show "${pkg}:arm64" >/dev/null 2>&1; then
              capnp_pkg="$pkg"
              break
            fi
          done

          if [[ -z "$capnp_pkg" ]]; then
            capnp_pkg="$(apt-cache search '^libcapnp-[0-9]' | awk '{print $1}' | sort -V | tail -n1 || true)"
          fi

          if [[ -z "$capnp_pkg" ]]; then
            echo "::error::No arm64 libcapnp runtime package found"
            exit 1
          fi

          sudo apt-get -o Dir::Cache::archives="$APT_CACHE_DIR" install -y --no-install-recommends \
            "${capnp_pkg}:arm64" \
            libzmq5:arm64

          ARM_CAPNP_SO="$(ls -1 /usr/lib/aarch64-linux-gnu/libcapnp-*.so | head -n1 || true)"
          ARM_KJ_SO="$(ls -1 /usr/lib/aarch64-linux-gnu/libkj-*.so | head -n1 || true)"
          ARM_ZMQ_SO="$(ls -1 /usr/lib/aarch64-linux-gnu/libzmq.so.* | head -n1 || true)"

          if [[ -z "$ARM_CAPNP_SO" || -z "$ARM_KJ_SO" || -z "$ARM_ZMQ_SO" ]]; then
            echo "::error::Failed to detect arm64 capnp/kj/zmq shared libraries"
            ls -la /usr/lib/aarch64-linux-gnu | head -n 200
            exit 1
          fi

          sudo ln -sf "$(basename "$ARM_CAPNP_SO")" /usr/lib/aarch64-linux-gnu/libcapnp.so
          sudo ln -sf "$(basename "$ARM_KJ_SO")" /usr/lib/aarch64-linux-gnu/libkj.so
          sudo ln -sf "$(basename "$ARM_ZMQ_SO")" /usr/lib/aarch64-linux-gnu/libzmq.so

          echo "arm_capnp_so=$ARM_CAPNP_SO" >> "$GITHUB_OUTPUT"
          echo "arm_kj_so=$ARM_KJ_SO" >> "$GITHUB_OUTPUT"

      - name: Resolve upstream SHA
        id: upstream
        run: |
          set -euo pipefail
          REPO='${{ matrix.target.upstream_repo }}'
          REF='${{ matrix.target.upstream_ref }}'
          SHA="$(git ls-remote "https://github.com/${REPO}.git" "refs/heads/${REF}" | awk '{print $1}')"
          if [[ -z "$SHA" ]]; then
            SHA="$(git ls-remote "https://github.com/${REPO}.git" "refs/tags/${REF}" | awk '{print $1}')"
          fi
          if [[ -z "$SHA" ]]; then
            SHA="$REF"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Restore upstream source cache
        id: upstream-cache
        uses: actions/cache@v4
        with:
          path: openpilot-src
          key: upstream-src-${{ runner.os }}-${{ matrix.target.upstream_repo }}-${{ steps.upstream.outputs.sha }}

      - name: Checkout upstream source
        if: steps.upstream-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target.upstream_repo }}
          ref: ${{ matrix.target.upstream_ref }}
          path: openpilot-src
          submodules: recursive

      - name: Run commaviewd verification pipeline
        env:
          OP_ROOT: ${{ github.workspace }}/openpilot-src
          ARM_CAPNP_SO: ${{ steps.armcapnp.outputs.arm_capnp_so }}
          ARM_KJ_SO: ${{ steps.armcapnp.outputs.arm_kj_so }}
          RELEASE_SMOKE_TAG: ci-${{ matrix.target.name }}-${{ github.run_id }}
        run: |
          set -euxo pipefail
          commaviewd/scripts/run-verification.sh

      - name: Verification summary
        if: always()
        run: |
          {
            echo "### commaviewd verification (${{ matrix.target.name }})"
            echo "- Upstream: \`${{ matrix.target.upstream_repo }}@${{ matrix.target.upstream_ref }}\`"
            echo "- Upstream SHA: \`${{ steps.upstream.outputs.sha }}\`"
            echo "- Upstream source cache hit: \`${{ steps.upstream-cache.outputs.cache-hit || 'false' }}\`"
            if [[ -f dist/upstream-interface-manifest.json ]]; then
              echo "- Interface manifest: dist/upstream-interface-manifest.json"
            fi
            if [[ -f dist/binary-contract.json ]]; then
              echo "- Binary contract: dist/binary-contract.json"
            fi
            if [[ -f dist/release-smoke-manifest.json ]]; then
              echo "- Release smoke: dist/release-smoke-manifest.json"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload dist artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commaviewd-dist-${{ matrix.target.name }}-${{ github.sha }}
          path: |
            dist/commaviewd-host
            dist/commaviewd-aarch64
            dist/reproducible-build-manifest.json
            dist/upstream-interface-manifest.json
            dist/binary-contract.json
            dist/release-smoke-manifest.json
            release/*/commaview-comma4-*.tar.gz
            release/*/commaview-comma4-*.tar.gz.sha256
          if-no-files-found: warn
