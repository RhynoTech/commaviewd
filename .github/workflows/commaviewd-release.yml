name: commaviewd-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to package (e.g., v0.0.35-alpha)'
        required: true
        type: string
      allow_overwrite:
        description: 'Allow manual dispatch to overwrite assets on an existing release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: commaviewd-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bundle-and-publish:
    name: Build comma4 release bundle + publish assets
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 90

    steps:
      - name: Resolve release tag
        id: vars
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${REQUESTED_TAG}"
          if [[ -z "$TAG" ]]; then
            echo "No tag resolved" >&2
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha$ ]]; then
            echo "Tag must match v<major>.<minor>.<patch>-alpha (got: $TAG)" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout CommaView
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Verify runtime version matches tag
        run: |
          set -euo pipefail
          WANT_VERSION='${{ steps.vars.outputs.version }}'
          WANT_TAG='${{ steps.vars.outputs.tag }}'
          # shellcheck disable=SC1091
          . comma4/version.env
          echo "VERSION in comma4/version.env: ${VERSION:-}"
          echo "RELEASE_TAG in comma4/version.env: ${RELEASE_TAG:-}"
          [[ "${VERSION:-}" == "$WANT_VERSION" ]] || {
            echo "VERSION mismatch: expected $WANT_VERSION from tag, got ${VERSION:-}" >&2
            exit 1
          }
          [[ "${RELEASE_TAG:-}" == "$WANT_TAG" ]] || {
            echo "RELEASE_TAG mismatch: expected $WANT_TAG, got ${RELEASE_TAG:-}" >&2
            exit 1
          }

      - name: Restore apt package cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/commaview-apt/archives
          key: apt-${{ runner.os }}-${{ runner.arch }}-commaviewd-toolchain-v1
          restore-keys: |
            apt-${{ runner.os }}-${{ runner.arch }}-commaviewd-toolchain-

      - name: Install toolchain + deps
        id: armcapnp
        run: ./scripts/install-commaviewd-toolchain.sh

      - name: Load release upstream ref
        id: release-upstream
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ci/upstream-refs.env
          [[ -n "${COMMAVIEWD_RELEASE_OPENPILOT_REF:-}" ]] || {
            echo "Missing COMMAVIEWD_RELEASE_OPENPILOT_REF in ci/upstream-refs.env" >&2
            exit 1
          }
          echo "openpilot_ref=${COMMAVIEWD_RELEASE_OPENPILOT_REF}" >> "$GITHUB_OUTPUT"

      - name: Restore upstream source cache
        id: upstream-cache
        uses: actions/cache@v5
        with:
          path: openpilot-src
          key: upstream-src-${{ runner.os }}-commaai-openpilot-${{ steps.release-upstream.outputs.openpilot_ref }}

      - name: Checkout openpilot source
        if: steps.upstream-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: commaai/openpilot
          ref: ${{ steps.release-upstream.outputs.openpilot_ref }}
          path: openpilot-src
          submodules: recursive


      - name: Run release verification pipeline
        env:
          OP_ROOT: ${{ github.workspace }}/openpilot-src
          ARM_CAPNP_SO: ${{ steps.armcapnp.outputs.arm_capnp_so }}
          ARM_KJ_SO: ${{ steps.armcapnp.outputs.arm_kj_so }}
          RELEASE_SMOKE_TAG: release-smoke-${{ steps.vars.outputs.tag }}-${{ github.run_id }}
        run: |
          set -euxo pipefail
          commaviewd/scripts/run-verification.sh

      - name: Build release bundle
        env:
          OP_ROOT: ${{ github.workspace }}/openpilot-src
          ARM_CAPNP_SO: ${{ steps.armcapnp.outputs.arm_capnp_so }}
          ARM_KJ_SO: ${{ steps.armcapnp.outputs.arm_kj_so }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          set -euxo pipefail
          tools/release/comma4-build-bundle.sh "$RELEASE_TAG"

      - name: Upload release assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG='${{ steps.vars.outputs.tag }}'
          ASSET_TGZ="release/${TAG}/commaview-comma4-${TAG}.tar.gz"
          ASSET_SHA="${ASSET_TGZ}.sha256"

          release_exists=0
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_exists=1
          fi

          if [[ "$release_exists" = "1" && "${{ github.event_name }}" = "workflow_dispatch" && "${{ inputs.allow_overwrite }}" != "true" ]]; then
            echo "Release $TAG already exists; manual overwrite requires allow_overwrite=true" >&2
            exit 1
          fi

          if [[ "$release_exists" = "0" ]]; then
            gh release create "$TAG"               --repo "$GITHUB_REPOSITORY"               --title "$TAG"               --notes "Automated release for $TAG"               --prerelease
          fi

          gh release upload "$TAG" "$ASSET_TGZ" "$ASSET_SHA"             --repo "$GITHUB_REPOSITORY"             --clobber
